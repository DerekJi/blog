title: ZhigangJi Technical Blog
description: Software Design, Cloud & AI Native Development
author: Zhigang Ji
baseurl: /blog
url: https://derekji.github.io

# Build settings
markdown: kramdown
permalink: /:year/:month/:day/:slug.html

# Defaults - apply post layout to all posts
defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude files
exclude:
  - drafts/
  - _init/
  - Gemfile
  - Gemfile.lock
  - README.md
  - DEPLOYMENT_GUIDE.md
  - verify-local.sh
