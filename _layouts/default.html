<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/style.css">
    <link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/favicon.svg">
    <link rel="icon" type="image/png" href="{{ site.baseurl }}/favicon.png" sizes="192x192">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <a id="page-top" style="display: none;"></a>
    <div class="page-wrapper">
        <header class="site-header">
            <nav class="site-nav">
                <div class="nav-brand">
                    <button class="brand-button" onclick="window.location='{{ site.baseurl }}/';" title="Home">
                        <span class="brand-text">ZJ</span>
                    </button>
                </div>
                <div class="nav-links">
                    <a href="https://derek-ji.medium.com/" class="nav-link" target="_blank" title="Medium" rel="noopener" style="padding:0 2px;">
                        <svg width="22" height="22" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="vertical-align:middle;">
                            <rect width="40" height="40" rx="8" fill="#12100E"/>
                            <path d="M11.5 20c0 4.142 2.91 7.5 6.5 7.5s6.5-3.358 6.5-7.5-2.91-7.5-6.5-7.5-6.5 3.358-6.5 7.5z" fill="#fff"/>
                            <ellipse cx="28.5" cy="20" rx="3.5" ry="7.5" fill="#fff"/>
                            <ellipse cx="34" cy="20" rx="2" ry="7.5" fill="#fff"/>
                        </svg>
                    </a>
                    <a href="https://github.com/DerekJi" class="nav-link" target="_blank" title="GitHub" rel="noopener" style="padding:0 2px;">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                    </a>
                    <a href="{{ site.baseurl }}/feed.xml" class="nav-link" title="RSS Feed" style="padding:0 2px;">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path d="M3 3h18v18H3V3zm2 2v14h14V5H5zm3 9c.552 0 1 .448 1 1s-.448 1-1 1-1-.448-1-1 .448-1 1-1zm0-4c2.761 0 5 2.239 5 5h2c0-3.866-3.134-7-7-7v2zm0-2c4.97 0 9 4.03 9 9h2c0-6.075-4.925-11-11-11v2z"/>
                        </svg>
                    </a>
                    <button id="dark-mode-toggle" class="nav-link" title="Toggle dark mode" style="padding:0 2px; background:none; border:none; cursor:pointer;">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path id="sun-icon" d="M12 17.5a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11zm0 2c-4.142 0-7.5-3.358-7.5-7.5S7.858 4.5 12 4.5s7.5 3.358 7.5 7.5-3.358 7.5-7.5 7.5zm0-15c.276 0 .5-.224.5-.5V1.5a.5.5 0 0 0-1 0V3c0 .276.224.5.5.5zm0 15c.276 0 .5.224.5.5v1.5a.5.5 0 0 1-1 0v-1.5c0-.276.224-.5.5-.5zm7.5-10c.276 0 .5-.224.5-.5a.5.5 0 0 0-1 0v1.5c0 .276.224.5.5.5zm0 0h1.5a.5.5 0 0 0 0-1h-1.5a.5.5 0 0 0 0 1zM4.5 12a.5.5 0 0 0-.5-.5H2.5a.5.5 0 0 0 0 1h1.5c.276 0 .5-.224.5-.5zm0 0a.5.5 0 0 1-.5.5H1.5a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5z"/>
                            <path id="moon-icon" style="display:none;" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </button>
                </div>
            </nav>
        </header>

        <main class="site-content">
            {{ content }}
        </main>

        <footer class="site-footer">
            <div class="footer-content">
                <p>&copy; {{ site.time | date: "%Y" }} {{ site.author }}. All rights reserved.</p>
            </div>
        </footer>
    </div>
<div class="lightbox-overlay" id="lightbox">
    <span class="lightbox-close" id="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="">
</div>

<script src="{{ site.baseurl }}/assets/main.js" defer></script>
</body>
</html>
