<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/style.css">
    <link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/favicon.svg">
    <link rel="icon" type="image/png" href="{{ site.baseurl }}/favicon.png" sizes="192x192">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">
        <header class="site-header">
            <nav class="site-nav">
                <div class="nav-brand">
                    <a href="{{ site.baseurl }}/">
                        <span class="brand-icon">▲</span>
                        <span class="brand-text">{{ site.title }}</span>
                    </a>
                </div>
                <div class="nav-links">
                    <a href="{{ site.baseurl }}/" class="nav-link">Home</a>
                    <a href="#" class="nav-link">About</a>
                </div>
            </nav>
        </header>

        <main class="site-content">
            {{ content }}
        </main>

        <footer class="site-footer">
            <div class="footer-content">
                <p>&copy; {{ site.time | date: "%Y" }} {{ site.author }}. All rights reserved.</p>
                <p class="footer-desc">{{ site.description }}</p>
            </div>
        </footer>
    </div>
<div class="lightbox-overlay" id="lightbox">
    <span class="lightbox-close" id="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="">
</div>

<script src="{{ site.baseurl }}/assets/main.js" defer></script>
</body>
</html>
